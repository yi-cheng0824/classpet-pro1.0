<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClassPet Pro - GitHub Pages 测试</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-align: center;
            padding: 50px;
            min-height: 100vh;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(255,255,255,0.95);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
            color: #333;
        }
        h1 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 32px;
        }
        h2 {
            color: #764ba2;
            margin-bottom: 20px;
            font-size: 24px;
        }
        .app-list {
            margin: 30px 0;
            display: grid;
            gap: 20px;
        }
        .app-link {
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 12px;
            text-decoration: none;
            font-weight: bold;
            transition: transform 0.2s;
            box-shadow: 0 4px 15px rgba(102,126,234,0.4);
        }
        .app-link:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(102,126,234,0.6);
        }
        .status-info {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎉 GitHub Pages 部署成功！</h1>
        <h2>ClassPet Pro v1.2.0</h2>
        
        <p>恭喜！您的 GitHub Pages 已成功部署。现在可以通过以下链接访问项目：</p>
        
        <div class="app-list">
            <a href="index.html" class="app-link">📺 大屏展示端</a>
            <a href="admin.html" class="app-link">📱 管理端</a>
            <a href="mobile.html" class="app-link">🐾 手机学生端</a>
        </div>
        
        <div class="status-info">
            <h3>📊 项目信息</h3>
            <p><strong>版本</strong>: v1.2.0 - 手机端完成版</p>
            <p><strong>功能</strong>: 班级宠物养成系统</p>
            <p><strong>包含</strong>: 大屏展示、管理端、手机学生端</p>
            <p><strong>技术</strong>: 纯前端 HTML/CSS/JS</p>
        </div>
    </div>
</body>
</html>
