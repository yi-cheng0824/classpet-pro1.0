<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我的宠物 - 二年级一班</title>
    <link rel="stylesheet" href="assets/css/mobile.css?v=1">
    <script>console.log('Mobile v1.0.0 - 2026-03-12');</script>
</head>
<body>
    <div id="app">
        <!-- 登录页面 -->
        <div id="loginPage" class="page active">
            <div class="login-container">
                <div class="logo">🐾</div>
                <h1>我的宠物</h1>
                <p class="class-name">二年级一班</p>
                
                <div class="form-group">
                    <label>选择你的名字</label>
                    <select id="studentSelect">
                        <option value="">请选择...</option>
                    </select>
                </div>
                
                <button class="btn-primary" id="btnLogin">查看我的宠物 🚀</button>
            </div>
        </div>

        <!-- 宠物主页 -->
        <div id="petPage" class="page">
            <header class="mobile-header">
                <h1 id="petHeaderName">我的宠物</h1>
                <button class="btn-logout" id="btnLogout">退出</button>
            </header>

            <div class="pet-main">
                <!-- 宠物展示 -->
                <div class="pet-display-large">
                    <div id="petImageContainer" class="pet-image-container stage-egg">
                        <div id="petEmoji" class="pet-emoji">🥚</div>
                    </div>
                    <div id="petStage" class="pet-stage">蛋</div>
                </div>

                <!-- 学生信息 -->
                <div class="student-info">
                    <div class="info-row">
                        <span class="label">姓名</span>
                        <span class="value" id="studentName">-</span>
                    </div>
                    <div class="info-row">
                        <span class="label">积分</span>
                        <span class="value score" id="studentScore">0</span>
                    </div>
                    <div class="info-row">
                        <span class="label">宠物名称</span>
                        <span class="value" id="petName">未认养</span>
                    </div>
                </div>

                <!-- 操作按钮 -->
                <div class="actions">
                    <button class="btn-action" id="btnAdopt">🏠 认养宠物</button>
                    <button class="btn-action" id="btnCustomize">🎨 自定义形象</button>
                    <button class="btn-action" id="btnRedeem">🎁 兑换奖励</button>
                </div>
            </div>
        </div>

        <!-- 认养弹窗 -->
        <div class="modal" id="adoptModal">
            <div class="modal-content">
                <h2>🏠 认养宠物</h2>
                <p class="current-score">当前积分: <span id="adoptScore">0</span></p>
                <div class="pet-options" id="petOptions">
                    <!-- 动态生成 -->
                </div>
                <button class="btn-close" id="closeAdopt">关闭</button>
            </div>
        </div>

        <!-- 自定义形象弹窗 -->
        <div class="modal" id="customizeModal">
            <div class="modal-content">
                <h2>🎨 自定义宠物形象</h2>
                <div class="upload-area" id="uploadArea">
                    <div class="upload-placeholder">
                        <span>📷</span>
                        <p>点击或拖拽上传图片</p>
                        <p class="hint">支持 JPG、PNG，建议尺寸 512x512</p>
                    </div>
                    <input type="file" id="imageInput" accept="image/*" hidden>
                </div>
                <button class="btn-save" id="saveCustomImage">保存</button>
                <button class="btn-close" id="closeCustomize">关闭</button>
            </div>
        </div>

        <!-- 兑换奖励弹窗 -->
        <div class="modal" id="redeemModal">
            <div class="modal-content">
                <h2>🎁 兑换奖励</h2>
                <p class="current-score">当前积分: <span id="redeemScore">0</span></p>
                <div class="reward-list" id="rewardList">
                    <!-- 动态生成 -->
                </div>
                <button class="btn-close" id="closeRedeem">关闭</button>
            </div>
        </div>

        <!-- 提示弹窗 -->
        <div class="modal" id="alertModal">
            <div class="modal-content modal-small">
                <h2 id="alertTitle">提示</h2>
                <p id="alertMessage">消息内容</p>
                <button class="btn-primary" id="closeAlert">确定</button>
            </div>
        </div>
    </div>

    <script src="js/pet-database.js"></script>
    <script src="js/data-manager.js"></script>
    <script src="js/pets.js"></script>
    <script src="js/mobile.js"></script>
</body>
</html>
